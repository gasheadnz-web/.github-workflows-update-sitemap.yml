name: Update Sitemap

on:
  schedule:
    - cron: "11 */12 * * *"   # Every 3 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run sitemap updater
        run: |
          echo "Running update_sitemap.py..."
          python update_sitemap.py

      - name: Show diff (for logging)
        run: |
          echo "=== GIT DIFF START ==="
          git diff --color=always || true
          echo "=== GIT DIFF END ==="

      - name: Commit changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add sitemap.xml .state.json || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Auto-update sitemap"
          git push
